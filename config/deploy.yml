service: evolution-api

image: cgimenes/evolution-api

primary_role: evolution

servers:
  evolution:
    hosts:
      - <%= ENV['SERVER']%>
    proxy: false
    options:
      network-alias: evolution-api

registry:
  username: cgimenes
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

env:
  clear:
    DATABASE_PROVIDER: postgresql
    QRCODE_COLOR: "#000000"
    TELEMETRY_ENABLED: false
    WEBSOCKET_ENABLED: true
  secret:
    - DATABASE_CONNECTION_URI
    - AUTHENTICATION_API_KEY

volumes:
  - evolution_instances:/evolution/instances

aliases:
  logs: app logs -f
